settings:
  content_limit: 8000           # chars stored in DynamoDB per article
  candidates_pool: 20           # unserved articles to consider per digest run
  max_per_author: 2             # max articles per author in the candidates pool (0 = no cap)
  digest_size: 10               # articles curated into the final digest
  words_per_minute: 200         # used to calculate read-time label
  youtube_lookback_days: 7      # how far back to fetch videos per run
  max_videos_per_channel: 3     # max new videos per channel per crawl
  summarise_long_threshold: 500 # word count at/above which TLDR approach is used

prompts:
  relevance_check: |
    Answer only 'yes' or 'no'.
    Is this article primarily about AI, machine learning, software engineering,
    devops, observability, programming, or technology leadership?
    Reply 'no' for personal life, travel, cultural events, or unrelated topics.

    Title: {title}
    Preview: {preview}

  summarise_short: |
    Write 1-2 sentences explaining what this article is about and why it matters
    to a senior software engineer. Be specific about the core idea — no "the author
    discusses", no fluff, no markdown formatting. Just the substance.

    Title: {title}
    Author: {author}

    {text}

  summarise_long: |
    You are summarising a long article for a senior software engineer's daily digest.
    Write a TLDR: distil the single most important insight in 2-3 sentences.
    Use your own words. Be direct and specific — skip the setup, get to the point.
    No fluff, no "the author discusses" — just the substance.

    Title: {title}
    Author: {author}

    {text}

  youtube_transcript_summarise: |
    Summarise this YouTube video transcript for a senior software engineer's daily reading digest.

    Return ONLY a JSON object with two fields:
    - "summary": 3-4 dense sentences covering the core idea and key takeaways. No fluff.
    - "detail": For information-dense videos (tutorials, deep-dives, research): 300-1500 words of
      structured prose covering key techniques, findings, architecture decisions, and concrete
      examples a senior engineer would care about. Use paragraphs separated by blank lines.
      Bold key terms with **asterisks**. For short or simple videos where the summary covers
      everything (opinion pieces, single announcements, YouTube Shorts), use null.

    Return ONLY valid JSON, no code blocks, no preamble.

    Title: {title}
    Author: {author}

    {text}

  youtube_summarise: |
    You are summarising a YouTube video for a senior software engineer's daily reading digest.

    Return ONLY a JSON object — no markdown, no code blocks, no preamble:
    {
      "summary": "3-4 dense sentences: the core idea and key takeaways for a senior engineer. No fluff.",
      "detail": "For information-dense videos (tutorials, deep-dives, research, multi-topic explorations): 300-1500 words of structured prose expanding on key techniques, findings, architecture decisions, or concrete examples a senior engineer would care about. Use paragraphs separated by blank lines. Bold key terms with **asterisks**. For short or simple videos where the summary already covers everything (opinion pieces, single announcements, YouTube Shorts), use null."
    }

  curate: |
    You are curating a daily reading digest for senior software engineers.

    From the articles below, select the {n} most fascinating — prioritise depth,
    novelty, and practical insight over announcements or opinion pieces.

    Reply with only the selected URLs, one per line. No commentary.

    {articles}
