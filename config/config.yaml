settings:
  content_limit: 8000      # chars stored in DynamoDB per article
  candidates_pool: 20      # unserved articles to consider per digest run
  max_per_author: 2        # max articles per author in the candidates pool (0 = no cap)
  digest_size: 10          # articles curated into the final digest
  words_per_minute: 200    # used to calculate read-time label
  youtube_lookback_days: 7  # how far back to fetch videos per run
  max_videos_per_channel: 3 # max new videos per channel per crawl

prompts:
  relevance_check: |
    Answer only 'yes' or 'no'.
    Is this article primarily about AI, machine learning, software engineering,
    devops, observability, programming, or technology leadership?
    Reply 'no' for personal life, travel, cultural events, or unrelated topics.

    Title: {title}
    Preview: {preview}

  summarise: |
    Extract the 2-3 most important sentences from this article, quoted verbatim
    from the text. Ignore navigation, ads, and boilerplate — only return the core idea
    in the author's own words. No introduction, no commentary, just the sentences.

    Title: {title}
    Author: {author}

    {text}

  curate: |
    You are curating a daily reading digest for senior software engineers.

    From the articles below, select the {n} most fascinating — prioritise depth,
    novelty, and practical insight over announcements or opinion pieces.

    Reply with only the selected URLs, one per line. No commentary.

    {articles}

  youtube_summarise: |
    Watch this YouTube video and extract the 2-3 most important technical insights
    in the presenter's own words. Skip intros, sponsor segments, and generic hype —
    focus on the core idea or technique. No introduction, no commentary, just the
    substance.

    Title: {title}
    Channel: {author}
